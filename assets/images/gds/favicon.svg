<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e0854"/>
      <stop offset="100%" stop-color="#6A0DAD"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Graduation cap board (mortarboard top) -->
  <polygon points="32,10 52,20 32,30 12,20" fill="#fff" opacity="0.95"/>

  <!-- Cap left tassel side -->
  <rect x="11" y="20" width="3" height="12" rx="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="12.5" cy="33" r="2" fill="#ffd700" opacity="0.9"/>

  <!-- Cap stem -->
  <rect x="30" y="28" width="4" height="10" rx="2" fill="#fff" opacity="0.85"/>

  <!-- "GDS" text -->
  <text x="32" y="58" font-family="Arial Black,sans-serif" font-weight="900" font-size="17" fill="#fff" text-anchor="middle" letter-spacing="-0.5">GDS</text>
</svg>
